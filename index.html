<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tela de Cadastro</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
    }

    form{
      display: flex;
      flex-direction: column;
      gap: 40px;

    }


    .left{
      width:45%;
      background:#ffffff;
      display:flex;
      justify-content:center;
      align-items:center;
    }


    .left img{
      width:50%;
      max-width:590px;
      border-radius:20px;
    }

    .right{
      width:55%;
      background:#ff5a26;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      gap:30px;
    }

    h1{
      color:white;
      font-size:60px;
      font-weight:300;
      position:absolute;
      top:215px;
    }

    .form{
      width:60%;
      display:flex;
      flex-direction:column;
      gap:45px;
      margin-top: 120px;
    }

    input{
      width:110%;
      padding:20px;
      border:none;
      border-radius:40px;
      background:#ddd;
      font-size:20px;
      outline:none;
      
    }

    .buttons{
      display:flex;
      gap:20px;
    }

    button{
      padding:15px 40px;
      border:none;
      border-radius:30px;
      background:#ffe100;
      font-size:24px;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
    }

   
  </style>
</head>
<body>

  
  <div class="left">

    <img src="ICONE VETROR.svg" alt="Imagem">

  </div>

  <div class="right">

    <h1>Bem Vindo!</h1>

    <div class="form">
      <form action="">

      <input type="username" placeholder="Nome" id="username">
      <input type="password" placeholder="Senha" id="password">

      <div class="buttons">
        <button>Cadastrar</button>
        <button type="button" onclick="login()">Login</button>
      </form>
      </div>
    </div>

  </div>
  <script src="login.js"></script>

</body>
</html>
